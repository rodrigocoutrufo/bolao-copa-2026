{% extends "base.html" %}

{% block content %}
<div class="hero">
    <h1>ESTATÍSTICAS DA CONTA</h1>
    <p>Acompanhe sua pontuação consolidada e métricas de acerto no Bolão.</p>
</div>

<div class="dashboard-grid">
    <div class="card" style="border-left: 3px solid var(--gold);">
        <div class="card-title">Pontos Acumulados</div>
        <div class="card-value" style="color: var(--gold);">{{ pontos_acumulados }}</div>
    </div>

    <div class="card" style="border-left: 3px solid var(--accent-green);">
        <div class="card-title">Placares Exatos</div>
        <div class="card-value" style="color: var(--accent-green);">{{ acertos_exatos }}</div>
    </div>

    <div class="card" style="--progress: {{ aproveitamento }}%;">
        <div class="card-title">Palpites Realizados</div>
        <div class="card-value">{{ aproveitamento }}%</div>
        <div style="background: rgba(255, 255, 255, 0.05); width: 100%; height: 4px; margin-top: 20px; overflow: hidden;">
            <div style="background: var(--accent-green); height: 100%; width: var(--progress);"></div>
        </div>
    </div>
</div>

<div style="margin-top: 40px;">
    <a href="{{ url_for('palpites') }}" class="btn-primary" style="max-width: 240px; text-decoration: none; text-align: center;">
        PALPITAR AGORA <i class="fa-solid fa-arrow-right"></i>
    </a>
</div>
{% endblock %}
